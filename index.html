<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="天逆珠" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3655/3655682.png" />
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3655/3655682.png" />
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/3655/3655682.png" />
    <title>天逆珠 | 修仙單字</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const swPath = window.location.pathname.endsWith('/') 
            ? 'sw.js' 
            : './sw.js';
          navigator.serviceWorker.register(swPath)
            .then(reg => console.log('天逆珠 Service Worker 註冊成功'))
            .catch(err => console.log('Service Worker 註冊失敗', err));
        });
      }
    </script>
  </body>
</html>
